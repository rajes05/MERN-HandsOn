<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram login/signup</title>
    <link rel="stylesheet" href="../Day-1/style.css">
</head>
<body>
    
    <!-- Insta login /signup section starts-->

    <section class="instaLoginSignupSection">

        <!-- left content box -->
        <div class="leftContentBox">

            <!-- left image box -->
            <div class="imageBox">
                <img src="../Day-1/assets/insta.png" alt="login/signup-image">
            </div>
        </div>

        <!-- right content box -->
         <div class="rightContentBox">

            <!-- insta logo -->
            <div class="instaLogo">
               <img src="../Day-1/assets/instaLogo" alt="">
            </div>

            <!-- form section -->
             <form action="" class="loginForm">

                <!-- input box -->
                <div class="inputBoxes">
                    <input type="email" placeholder="Phone number, username, or email">
                    <input type="password" placeholder="Password">
                </div>

                <button id="loginButton" type="submit">Log in</button>

                <!-- or  -->
                <div class="orContainer">
                    <div class="leftLine"></div>
                    <div class="orBox"><p>OR</p></div>
                    <div class="rightLine"></div>
                </div>

                <!-- login with facebook -->
                <div class="loginWithFB">

                    <div class="facebookLogo">
                        <svg aria-label="Log in with Facebook" class="x1lliihq x1n2onr6 x173jzuc" fill="currentColor" height="20" role="img" viewBox="0 0 16 16" width="20"><title>Log in with Facebook</title><g clip-path="url(#a)"><path d="M8 0C3.6 0 0 3.6 0 8c0 4 2.9 7.3 6.8 7.9v-5.6h-2V8h2V6.2c0-2 1.2-3.1 3-3.1.9 0 1.8.2 1.8.2v2h-1c-1 0-1.3.6-1.3 1.3V8h2.2l-.4 2.3H9.2v5.6C13.1 15.3 16 12 16 8c0-4.4-3.6-8-8-8Z" fill="currentColor"></path></g><defs><clipPath id="a"><rect fill="currentColor" height="16" width="16"></rect></clipPath></defs></svg>
                    </div>
                    <a href="">Log in with Facebook</a href="">
                </div>

                <a  id="forgotPassword" href=" ">Forgot Password?</a>

                <p id="signupContainer">Don't have an account? <a href="" id="instaSignup">Sign up</a>
</p>



             </form>
         </div>
    </section>

    <!-- footer -->
    <footer>
        <div class="footerContents">
        <ul>
            <li><a href="">Meta</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Blog</a></li>
            <li><a href="">Jobs</a></li>
            <li><a href="">Help</a></li>
            <li><a href="">API</a></li>
            <li><a href="">Privacy</a></li>
            <li><a href="">Terms</a></li>
            <li><a href="">Location</a></li>
            <li><a href="">Instagram Lite</a></li>
            <li><a href="">Threads</a></li>
            <li><a href="">Contact Uploading & Non-Users</a></li>
            <li><a href="">Meta Verified</a></li>
        </ul>
        </div>

        <footer>
    <div class="copyrightBox">
        <select name="language" id="language">
            <option value="en" selected>English</option>
            <option value="af">Afrikaans</option>
        </select>
        <p>&copy; 2025 Instagram from Meta</p>
    </div>
</footer>

     <!-- Insta ogin/signup Ends here -->
</body>
</html>
