<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook log in or sign up</title>
    <link rel="stylesheet" href="./facebook.css">
</head>
<body>
    <!-- outer wrapper -->
    <section class="loginWrapper">

        <!-- login container/content -->
         <div class="loginContainer">

            <!-- left box with image and heading text -->
             <div class="loginBoxLeft">
                <img src="./logo1.svg" alt="facebook logo">
                <h1>Connect with friends and the world around you on Facebook</h1>
             </div>

            <!-- right box with form -->
             <div class="loginBoxRight">

                <!-- login form -->
                 <form action="" class="loginForm">
                    <input type="email" placeholder="Enter email or Phone Number" required>  
                    <input type="password" placeholder="Password" required>
                    <button id="loginButton" type="submit">Log In</button>
                     
                    <a href="">Forgot Password?</a>

                    <hr>

                    <button id="createButton" type="submit">Create new account</button>

                 </form>

                 <p>
                     <a href="">|Create a Page</a>
                     <span>for a celebrity, brand or business.</span>
                 </p>
             </div>
         </div>

    </section>
</body>
</html>
